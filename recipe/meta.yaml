{% set python_min = "3.11" %}
{% set name = "tabulardelta" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tabulardelta-{{ version }}.tar.gz
  sha256: 190e2b774dca2b2d1a7e6dc9cc6b4540cfe90c0b51816b879822b4053c2b1cd0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24.4,<3
    - pandas >=2.0.3,<3

test:
  imports:
    - tabulardelta
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/quantco/tabulardelta
  summary: Simplify table comparisons.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - DominikZuercherQC
    - AaronTacke
